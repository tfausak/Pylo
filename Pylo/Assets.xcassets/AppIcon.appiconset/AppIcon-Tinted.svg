<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#9E9E9E"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#616161" flood-opacity="0.25"/>
    </filter>
    <filter id="inner-shadow">
      <feComponentTransfer in="SourceAlpha">
        <feFuncA type="table" tableValues="1 0"/>
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feFlood flood-color="#BDBDBD" flood-opacity="0.5" result="color"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Left antenna -->
  <g>
    <line x1="370" y1="310" x2="310" y2="175" stroke="#BDBDBD" stroke-width="14" stroke-linecap="round"/>
    <circle cx="310" cy="175" r="32" fill="#757575"/>
    <circle cx="304" cy="168" r="10" fill="white" opacity="0.4"/>
  </g>

  <!-- Right antenna -->
  <g>
    <line x1="654" y1="310" x2="714" y2="175" stroke="#BDBDBD" stroke-width="14" stroke-linecap="round"/>
    <circle cx="714" cy="175" r="32" fill="#757575"/>
    <circle cx="708" cy="168" r="10" fill="white" opacity="0.4"/>
  </g>

  <!-- Robot head/body -->
  <rect x="242" y="290" width="540" height="480" rx="100" fill="url(#body)" filter="url(#shadow)"/>

  <!-- Face plate -->
  <rect x="292" y="340" width="440" height="310" rx="70" fill="url(#face)" filter="url(#inner-shadow)"/>

  <!-- Eyes -->
  <g>
    <ellipse cx="410" cy="470" rx="52" ry="56" fill="#616161"/>
    <ellipse cx="410" cy="465" rx="44" ry="48" fill="#757575"/>
    <circle cx="395" cy="450" r="18" fill="white" opacity="0.7"/>
    <circle cx="420" cy="475" r="8" fill="white" opacity="0.3"/>
  </g>
  <g>
    <ellipse cx="614" cy="470" rx="52" ry="56" fill="#616161"/>
    <ellipse cx="614" cy="465" rx="44" ry="48" fill="#757575"/>
    <circle cx="599" cy="450" r="18" fill="white" opacity="0.7"/>
    <circle cx="624" cy="475" r="8" fill="white" opacity="0.3"/>
  </g>

  <!-- Cheeks -->
  <ellipse cx="340" cy="540" rx="36" ry="24" fill="#9E9E9E" opacity="0.3"/>
  <ellipse cx="684" cy="540" rx="36" ry="24" fill="#9E9E9E" opacity="0.3"/>

  <!-- Smile -->
  <path d="M 450 560 Q 512 610 574 560" fill="none" stroke="#757575" stroke-width="12" stroke-linecap="round"/>

  <!-- Ear panels -->
  <rect x="222" y="400" width="36" height="100" rx="18" fill="#BDBDBD"/>
  <rect x="766" y="400" width="36" height="100" rx="18" fill="#BDBDBD"/>

  <!-- Belly -->
  <g>
    <rect x="432" y="680" width="160" height="60" rx="30" fill="#BDBDBD" opacity="0.5"/>
    <circle cx="512" cy="710" r="14" fill="#9E9E9E"/>
    <circle cx="512" cy="710" r="8" fill="white" opacity="0.4"/>
  </g>
</svg>
